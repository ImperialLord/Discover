<!doctype html><meta charset="utf-8"><title>Discover OS — Administrator Console</title><style>body{background:#07131e;color:#dce8f6;font:14px system-ui;margin:0;padding:20px}.panel{background:#0b1b2a;border:1px solid #31516b;border-radius:10px;padding:14px;margin:12px 0}h1,h2{color:#82d6ff}pre{white-space:pre-wrap;color:#b9d6e7}</style><h1>Discover OS <small>Administrator Console</small></h1><p>Local institutional coordination view. This is not part of the Builder Project Desk.</p><div class="panel"><h2>Institution Health</h2><pre id="health">Loading…</pre></div><div class="panel"><h2>Running Services</h2><pre id="services"></pre></div><div class="panel"><h2>Active Events</h2><pre id="events"></pre></div><script>async function load(){let r=await fetch('/api/os/admin'),d=await r.json();health.textContent=JSON.stringify({health:d.institution_health,state:d.state,warnings:d.system_warnings},null,2);services.textContent=d.services.map(x=>x.name+' · '+x.status+' · '+x.purpose).join('\n');events.textContent=d.active_events.map(x=>x.timestamp+' · '+x.type+' · '+x.event_id).join('\n')||'No events yet.'}load();setInterval(load,5000)</script>
